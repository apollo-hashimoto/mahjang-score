<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻雀点数表アプリ</title>
    <style>
        body { font-family: sans-serif; padding: 10px; font-size: 14px; }
        h1 { font-size: 18px; text-align: center; }
        
        .tabs { display: flex; margin-bottom: 15px; justify-content: center; flex-wrap: wrap; }
        .tab { padding: 8px 12px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-bottom: none; margin: 2px; border-radius: 5px 5px 0 0; }
        .tab.active { background: #fff; font-weight: bold; border-top: 3px solid #4CAF50; border-bottom: 1px solid #fff; }
        
        /* 表が画面からはみ出さないようにスクロール可能にする */
        .table-container { overflow-x: auto; margin-bottom: 20px; }
        table { border-collapse: collapse; width: 100%; min-width: 400px; }
        th, td { border: 1px solid #aaa; padding: 5px; text-align: center; }
        th { background-color: #f9f9f9; font-size: 12px; }
        
        /* 入力欄のサイズ調整 */
        input { width: 100%; box-sizing: border-box; padding: 10px 5px; font-size: 16px; text-align: center; border: 1px solid #ccc; border-radius: 4px; }
        
        /* 「なし」のセルのデザイン */
        .disabled-cell { background-color: #e0e0e0; pointer-events: none; border-color: #ccc; }
        
        .correct { background-color: #c8e6c9; border-color: #4CAF50; }
        .incorrect { background-color: #ffcdd2; border-color: #f44336; }
        .ans-text { display: block; font-size: 11px; color: #d32f2f; margin-top: 2px; font-weight: bold; min-height: 14px;}
        
        button { display: block; width: 100%; max-width: 300px; margin: 0 auto; padding: 15px; font-size: 18px; font-weight: bold; background-color: #2196F3; color: white; border: none; border-radius: 8px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:active { transform: translateY(2px); box-shadow: none; }
    </style>
</head>
<body>

    <h1>🀄 麻雀点数表トレーニング</h1>

    <div class="tabs">
        <div class="tab active" onclick="changeTab('ko_ron', this)">子ロン</div>
        <div class="tab" onclick="changeTab('ko_tsumo', this)">子ツモ</div>
        <div class="tab" onclick="changeTab('oya_ron', this)">親ロン</div>
        <div class="tab" onclick="changeTab('oya_tsumo', this)">親ツモ</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>符/翻</th>
                    <th>1翻</th>
                    <th>2翻</th>
                    <th>3翻</th>
                    <th>4翻</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

    <button onclick="checkAnswers()">答え合わせ</button>

    <script>
        // 満貫をすべて数値化し、完全なデータに更新
        const scores = {
            'ko_ron': {
                20: { 1: "なし", 2: "なし", 3: "なし", 4: "なし" },
                25: { 1: "なし", 2: "1600", 3: "3200", 4: "6400" },
                30: { 1: "1000", 2: "2000", 3: "3900", 4: "7700" },
                40: { 1: "1300", 2: "2600", 3: "5200", 4: "8000" },
                50: { 1: "1600", 2: "3200", 3: "6400", 4: "8000" },
                60: { 1: "2000", 2: "3900", 3: "7700", 4: "8000" },
                70: { 1: "2300", 2: "4500", 3: "8000", 4: "8000" },
                80: { 1: "2600", 2: "5200", 3: "8000", 4: "8000" },
                90: { 1: "2900", 2: "5800", 3: "8000", 4: "8000" },
                100: { 1: "3200", 2: "6400", 3: "8000", 4: "8000" },
                110: { 1: "3600", 2: "7100", 3: "8000", 4: "8000" }
            },
            'ko_tsumo': {
                20: { 1: "なし", 2: "400/700", 3: "700/1300", 4: "1300/2600" },
                25: { 1: "なし", 2: "なし", 3: "800/1600", 4: "1600/3200" },
                30: { 1: "300/500", 2: "500/1000", 3: "1000/2000", 4: "2000/3900" },
                40: { 1: "400/700", 2: "700/1300", 3: "1300/2600", 4: "2000/4000" },
                50: { 1: "400/800", 2: "800/1600", 3: "1600/3200", 4: "2000/4000" },
                60: { 1: "500/1000", 2: "1000/2000", 3: "2000/3900", 4: "2000/4000" },
                70: { 1: "600/1200", 2: "1200/2300", 3: "2000/4000", 4: "2000/4000" },
                80: { 1: "700/1300", 2: "1300/2600", 3: "2000/4000", 4: "2000/4000" },
                90: { 1: "800/1500", 2: "1500/2900", 3: "2000/4000", 4: "2000/4000" },
                100: { 1: "800/1600", 2: "1600/3200", 3: "2000/4000", 4: "2000/4000" },
                110: { 1: "900/1800", 2: "1800/3600", 3: "2000/4000", 4: "2000/4000" }
            },
            'oya_ron': {
                20: { 1: "なし", 2: "なし", 3: "なし", 4: "なし" },
                25: { 1: "なし", 2: "2400", 3: "4800", 4: "9600" },
                30: { 1: "1500", 2: "2900", 3: "5800", 4: "11600" },
                40: { 1: "2000", 2: "3900", 3: "7700", 4: "12000" },
                50: { 1: "2400", 2: "4800", 3: "9600", 4: "12000" },
                60: { 1: "2900", 2: "5800", 3: "11600", 4: "12000" },
                70: { 1: "3400", 2: "6800", 3: "12000", 4: "12000" },
                80: { 1: "3900", 2: "7700", 3: "12000", 4: "12000" },
                90: { 1: "4400", 2: "8700", 3: "12000", 4: "12000" },
                100: { 1: "4800", 2: "9600", 3: "12000", 4: "12000" },
                110: { 1: "5300", 2: "10600", 3: "12000", 4: "12000" }
            },
            'oya_tsumo': {
                20: { 1: "なし", 2: "700ALL", 3: "1300ALL", 4: "2600ALL" },
                25: { 1: "なし", 2: "なし", 3: "1600ALL", 4: "3200ALL" },
                30: { 1: "500ALL", 2: "1000ALL", 3: "2000ALL", 4: "3900ALL" },
                40: { 1: "700ALL", 2: "1300ALL", 3: "2600ALL", 4: "4000ALL" },
                50: { 1: "800ALL", 2: "1600ALL", 3: "3200ALL", 4: "4000ALL" },
                60: { 1: "1000ALL", 2: "2000ALL", 3: "3900ALL", 4: "4000ALL" },
                70: { 1: "1200ALL", 2: "2300ALL", 3: "4000ALL", 4: "4000ALL" },
                80: { 1: "1300ALL", 2: "2600ALL", 3: "4000ALL", 4: "4000ALL" },
                90: { 1: "1500ALL", 2: "2900ALL", 3: "4000ALL", 4: "4000ALL" },
                100: { 1: "1600ALL", 2: "3200ALL", 3: "4000ALL", 4: "4000ALL" },
                110: { 1: "1800ALL", 2: "3600ALL", 3: "4000ALL", 4: "4000ALL" }
            }
        };

        let currentTab = 'ko_ron';

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            
            const currentScores = scores[currentTab];
            
            for (const fu in currentScores) {
                let row = `<tr><th>${fu}符</th>`;
                for (let han = 1; han <= 4; han++) {
                    const answer = currentScores[fu][han];
                    
                    if (answer === "なし") {
                        // 「なし」の場合はグレーにして入力を無効化
                        row += `<td><input type="text" class="disabled-cell" disabled></td>`;
                    } else {
                        // inputmode="numeric" pattern="[0-9]*" でスマホの数字キーボードを強制呼び出し
                        row += `
                            <td>
                                <input type="text" inputmode="numeric" pattern="[0-9]*" id="input-${fu}-${han}" data-ans="${answer}">
                                <span id="msg-${fu}-${han}" class="ans-text"></span>
                            </td>
                        `;
                    }
                }
                row += `</tr>`;
                tbody.innerHTML += row;
            }
        }

        function changeTab(tabName, element) {
            currentTab = tabName;
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            renderTable();
        }

        function checkAnswers() {
            const currentScores = scores[currentTab];

            for (const fu in currentScores) {
                for (let han = 1; han <= 4; han++) {
                    const answer = currentScores[fu][han];
                    if (answer === "なし") continue; // 「なし」は判定スキップ

                    const inputEl = document.getElementById(`input-${fu}-${han}`);
                    const msgEl = document.getElementById(`msg-${fu}-${han}`);
                    const correctAns = inputEl.getAttribute('data-ans');
                    const userAns = inputEl.value.trim();

                    inputEl.classList.remove('correct', 'incorrect');
                    msgEl.innerText = '';

                    if (userAns === "") continue;

                    // ★スマート入力判定：入力と答えの両方から「数字以外（/やALL）」を取り除いて比較
                    // これにより、「400/700」の答えに対して「400700」と入力するだけで正解になる
                    const normalizedCorrect = correctAns.replace(/[^0-9]/g, '');
                    const normalizedUser = userAns.replace(/[^0-9]/g, '');

                    if (normalizedUser === normalizedCorrect) {
                        inputEl.classList.add('correct');
                    } else {
                        inputEl.classList.add('incorrect');
                        msgEl.innerText = correctAns; // 不正解時は元の綺麗な形式(400/700など)で表示
                    }
                }
            }
        }

        renderTable();
    </script>
</body>
</html>
