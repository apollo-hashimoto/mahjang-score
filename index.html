<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>麻雀点数表アプリ</title>
    <style>
        /* ここは見た目（デザイン）を作るCSSのエリアです */
        body { font-family: sans-serif; padding: 20px; }
        .tabs { display: flex; margin-bottom: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-bottom: none; }
        .tab.active { background: #fff; font-weight: bold; border-top: 3px solid #4CAF50; }
        table { border-collapse: collapse; margin-bottom: 20px; }
        th, td { border: 1px solid #aaa; padding: 10px; text-align: center; }
        th { background-color: #f9f9f9; }
        input { width: 80px; padding: 8px; font-size: 16px; text-align: center; border: 1px solid #ccc; }
        
        /* 正解・不正解の色 */
        .correct { background-color: #c8e6c9; border-color: #4CAF50; } /* 緑色 */
        .incorrect { background-color: #ffcdd2; border-color: #f44336; } /* 赤色 */
        
        /* 正解のテキスト */
        .ans-text { display: block; font-size: 12px; color: #d32f2f; margin-top: 5px; font-weight: bold; min-height: 15px;}
        button { padding: 10px 20px; font-size: 16px; background-color: #2196F3; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🀄 麻雀点数表トレーニング</h1>

    <div class="tabs">
        <div class="tab active" onclick="changeTab('ko_ron', this)">子・ロン</div>
        <div class="tab" onclick="changeTab('ko_tsumo', this)">子・ツモ</div>
        <div class="tab" onclick="changeTab('oya_ron', this)">親・ロン</div>
        <div class="tab" onclick="changeTab('oya_tsumo', this)">親・ツモ</div>
    </div>

    <table>
        <thead>
            <tr>
                <th>符 / 翻</th>
                <th>1翻</th>
                <th>2翻</th>
                <th>3翻</th>
                <th>4翻</th>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
    </table>

    <button onclick="checkAnswers()">答え合わせ</button>

    <script>
        // ここから下は動きを作るJavaScriptのエリアです
        
        // 点数データ（まずは30符・40符だけ用意しました！）
        // 慣れてきたら、ここに20符や50符〜110符を書き足していけばOKです。
// すべての点数データ（20符〜110符、1翻〜4翻）
const scores = {
            'ko_ron': {
                20: { 1: "なし", 2: "なし", 3: "なし", 4: "なし" }, // 20符のロンは存在しない
                25: { 1: "なし", 2: "1600", 3: "3200", 4: "6400" }, // 七対子用
                30: { 1: "1000", 2: "2000", 3: "3900", 4: "7700" },
                40: { 1: "1300", 2: "2600", 3: "5200", 4: "満貫" },
                50: { 1: "1600", 2: "3200", 3: "6400", 4: "満貫" },
                60: { 1: "2000", 2: "3900", 3: "7700", 4: "満貫" },
                70: { 1: "2300", 2: "4500", 3: "満貫", 4: "満貫" },
                80: { 1: "2600", 2: "5200", 3: "満貫", 4: "満貫" },
                90: { 1: "2900", 2: "5800", 3: "満貫", 4: "満貫" },
                100: { 1: "3200", 2: "6400", 3: "満貫", 4: "満貫" },
                110: { 1: "3600", 2: "7100", 3: "満貫", 4: "満貫" }
            },
            'ko_tsumo': {
                20: { 1: "なし", 2: "400/700", 3: "700/1300", 4: "1300/2600" }, // 平和ツモ
                25: { 1: "なし", 2: "なし", 3: "800/1600", 4: "1600/3200" }, // 七対子ツモ
                30: { 1: "300/500", 2: "500/1000", 3: "1000/2000", 4: "2000/3900" },
                40: { 1: "400/700", 2: "700/1300", 3: "1300/2600", 4: "満貫" },
                50: { 1: "400/800", 2: "800/1600", 3: "1600/3200", 4: "満貫" },
                60: { 1: "500/1000", 2: "1000/2000", 3: "2000/3900", 4: "満貫" },
                70: { 1: "600/1200", 2: "1200/2300", 3: "満貫", 4: "満貫" },
                80: { 1: "700/1300", 2: "1300/2600", 3: "満貫", 4: "満貫" },
                90: { 1: "800/1500", 2: "1500/2900", 3: "満貫", 4: "満貫" },
                100: { 1: "800/1600", 2: "1600/3200", 3: "満貫", 4: "満貫" },
                110: { 1: "900/1800", 2: "1800/3600", 3: "満貫", 4: "満貫" }
            },
            'oya_ron': {
                20: { 1: "なし", 2: "なし", 3: "なし", 4: "なし" },
                25: { 1: "なし", 2: "2400", 3: "4800", 4: "9600" },
                30: { 1: "1500", 2: "2900", 3: "5800", 4: "11600" },
                40: { 1: "2000", 2: "3900", 3: "7700", 4: "満貫" },
                50: { 1: "2400", 2: "4800", 3: "9600", 4: "満貫" },
                60: { 1: "2900", 2: "5800", 3: "11600", 4: "満貫" },
                70: { 1: "3400", 2: "6800", 3: "満貫", 4: "満貫" },
                80: { 1: "3900", 2: "7700", 3: "満貫", 4: "満貫" },
                90: { 1: "4400", 2: "8700", 3: "満貫", 4: "満貫" },
                100: { 1: "4800", 2: "9600", 3: "満貫", 4: "満貫" },
                110: { 1: "5300", 2: "10600", 3: "満貫", 4: "満貫" }
            },
            'oya_tsumo': {
                20: { 1: "なし", 2: "700ALL", 3: "1300ALL", 4: "2600ALL" },
                25: { 1: "なし", 2: "なし", 3: "1600ALL", 4: "3200ALL" },
                30: { 1: "500ALL", 2: "1000ALL", 3: "2000ALL", 4: "3900ALL" },
                40: { 1: "700ALL", 2: "1300ALL", 3: "2600ALL", 4: "満貫" },
                50: { 1: "800ALL", 2: "1600ALL", 3: "3200ALL", 4: "満貫" },
                60: { 1: "1000ALL", 2: "2000ALL", 3: "3900ALL", 4: "満貫" },
                70: { 1: "1200ALL", 2: "2300ALL", 3: "満貫", 4: "満貫" },
                80: { 1: "1300ALL", 2: "2600ALL", 3: "満貫", 4: "満貫" },
                90: { 1: "1500ALL", 2: "2900ALL", 3: "満貫", 4: "満貫" },
                100: { 1: "1600ALL", 2: "3200ALL", 3: "満貫", 4: "満貫" },
                110: { 1: "1800ALL", 2: "3600ALL", 3: "満貫", 4: "満貫" }
            }
        };

        let currentTab = 'ko_ron';

        // 表を作る機能
        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = ''; // 一度表を空にする
            
            const currentScores = scores[currentTab];
            if (!currentScores || Object.keys(currentScores).length === 0) {
                tbody.innerHTML = '<tr><td colspan="5">まだデータがありません。プログラムにデータを追加してね！</td></tr>';
                return;
            }

            // データがある分だけ行を作る
            for (const fu in currentScores) {
                let row = `<tr><td>${fu}符</td>`;
                for (let han = 1; han <= 4; han++) {
                    const answer = currentScores[fu][han];
                    row += `
                        <td>
                            <input type="text" id="input-${fu}-${han}" data-ans="${answer}">
                            <span id="msg-${fu}-${han}" class="ans-text"></span>
                        </td>
                    `;
                }
                row += `</tr>`;
                tbody.innerHTML += row;
            }
        }

        // タブを切り替える機能
        function changeTab(tabName, element) {
            currentTab = tabName;
            
            // 色を変える処理
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            element.classList.add('active');
            
            // 表を描き直す
            renderTable();
        }

        // 答え合わせをする機能
        function checkAnswers() {
            const currentScores = scores[currentTab];
            if (!currentScores) return;

            for (const fu in currentScores) {
                for (let han = 1; han <= 4; han++) {
                    const inputEl = document.getElementById(`input-${fu}-${han}`);
                    const msgEl = document.getElementById(`msg-${fu}-${han}`);
                    const correctAns = inputEl.getAttribute('data-ans');
                    const userAns = inputEl.value.trim(); // 入力された文字の空白を消す

                    // 一旦色とメッセージをリセット
                    inputEl.classList.remove('correct', 'incorrect');
                    msgEl.innerText = '';

                    // 何も入力されていなければ無視
                    if (userAns === "") continue;

                    // 判定！
                    if (userAns === correctAns) {
                        inputEl.classList.add('correct'); // 正解なら緑
                    } else {
                        inputEl.classList.add('incorrect'); // 不正解なら赤
                        msgEl.innerText = correctAns; // 下に正しい答えを出す
                    }
                }
            }
        }

        // 最初にページを開いた時に表を作る
        renderTable();
    </script>
</body>
</html>
